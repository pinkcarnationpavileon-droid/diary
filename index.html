    <script>
        
        window.onload = function() {
            const loadBar = document.getElementById('load-bar');
            const bootScreen = document.getElementById('boot-screen');
            const loginScreen = document.getElementById('login-screen');
            
          
           setTimeout(() => { loadBar.style.width = '100%'; }, 100);

                        setTimeout(() => {
                bootScreen.style.opacity = '0';
                setTimeout(() => {
                    bootScreen.style.display = 'none';
                    loginScreen.style.display = 'flex';
                    simulateTyping();
                }, 1000);
            }, 2500);
        };


        function simulateTyping() {
            const input = document.getElementById('fake-pass');
            const password = "********";
            let i = 0;
            
            const typeInterval = setInterval(() => {
                if (i < password.length) {
                    input.value += "*";
                    i++;
                } else {
                    clearInterval(typeInterval);

                    setTimeout(loginToDesktop, 800);
                }
            }, 150); // Speed of typing
        }

        function loginToDesktop() {
            const loginScreen = document.getElementById('login-screen');
            const desktop = document.getElementById('desktop');
            
            loginScreen.style.opacity = '0';
            setTimeout(() => {
                loginScreen.style.display = 'none';
                desktop.style.display = 'flex';
                startClock();
            }, 1000);
        }

        // 3. Clock Functionality
        function startClock() {
            const clockEl = document.getElementById('clock');
            setInterval(() => {
                const now = new Date();
                clockEl.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }, 1000);
        }

        // 4. Window Management (Open/Close)
        let zIndexCounter = 10;

        function openWindow(id) {
            const win = document.getElementById(id);
            win.style.display = 'flex';
            bringToFront(win);
        }

        function closeWindow(id) {
            document.getElementById(id).style.display = 'none';
        }

        function bringToFront(element) {
            zIndexCounter++;
            element.style.zIndex = zIndexCounter;
        }

        // 5. Draggable Logic
        let isDragging = false;
        let currentWindow = null;
        let offsetX, offsetY;

        function dragStart(e, id) {
            isDragging = true;
            currentWindow = document.getElementById(id);
            bringToFront(currentWindow);
            
            // Calculate offset relative to the window
            offsetX = e.clientX - currentWindow.getBoundingClientRect().left;
            offsetY = e.clientY - currentWindow.getBoundingClientRect().top;
        }

        document.addEventListener('mousemove', (e) => {
            if (isDragging && currentWindow) {
                e.preventDefault();
                currentWindow.style.left = (e.clientX - offsetX) + 'px';
                currentWindow.style.top = (e.clientY - offsetY) + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            currentWindow = null;
        });

        // Bring window to front on click
        document.querySelectorAll('.window').forEach(win => {
            win.addEventListener('mousedown', () => bringToFront(win));
        });
        
        /* Add these functions to your <script> */

function minimizeWindow(id) {
    const win = document.getElementById(id);
    // Simple mimic: hide the content but keep header, or just hide the whole window
    // Here we hide the whole window like closing, but you could animate it to taskbar
    win.style.display = 'none'; 
}

function maximizeWindow(id) {
    const win = document.getElementById(id);
    // Toggle between normal size and full screen
    if (win.style.width === '100%') {
        // Restore
        win.style.width = '400px';
        win.style.height = '300px';
        win.style.top = '100px';
        win.style.left = '100px';
        win.style.borderRadius = '6px';
    } else {
        // Maximize
        win.style.width = '100%';
        win.style.height = 'calc(100% - 45px)'; // Subtract taskbar height
        win.style.top = '0';
        win.style.left = '0';
        win.style.borderRadius = '0';
    }
}

// Existing closeWindow function remains the same
function closeWindow(id) {
    document.getElementById(id).style.display = 'none';
}
