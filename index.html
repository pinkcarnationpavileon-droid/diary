<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="style-2.css">
  <title>what's the ₛᵤbₛcᵣᵢbₑd list like?</title>
  <link rel="icon" type="image/jpeg" href="newfavicon.png" alt="myface">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">
</head>
 
</head>
<body>
    <!-- Boot Screen -->
    <div id="boot-screen">
        <h2>Starting System...</h2>
        <div style="width: 200px; height: 4px; background: #333; margin-top: 20px; border-radius: 2px;">
            <div id="load-bar" style="width: 0%; height: 100%; background: white; transition: width 2s ease-in-out;"></div>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <div class="avatar"></div>
            <h3>User</h3>
            <input type="password" id="fake-pass" class="password-input" readonly>
            <p style="font-size: 12px; margin-top: 10px; opacity: 0.8;">Simulating Entry...</p>
        </div>
    </div>

    <!-- Desktop -->
    <div id="desktop">
        <!-- Icons -->
        <div class="icons-container">
            <div class="desktop-icon" onclick="openWindow('win1')">
                <img src="https://cdn-icons-png.flaticon.com/512/2921/2921226.png" alt="Folder">
                <span>Photos</span>
            </div>
            <div class="desktop-icon" onclick="openWindow('win2')">
                <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png" alt="Browser">
                <span>Internet</span>
            </div>
            <div class="desktop-icon" onclick="openWindow('win3')">
                <img src="https://cdn-icons-png.flaticon.com/512/2921/2921236.png" alt="Settings">
                <span>Settings</span>
            </div>
        </div>

        <!-- Windows (Hidden by default) -->
        <!-- Window 1 -->
        <div id="win1" class="window">
            <div class="window-header" onmousedown="dragStart(event, 'win1')">
                <span>Photo Viewer</span>
                <button class="close-btn" onclick="closeWindow('win1')"></button>
            </div>
            <div class="window-content">
                <!-- Clickable Image linking to another page -->
                <a href="https://www.google.com" target="_blank" style="text-decoration: none;">
                    <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&w=400&q=80" alt="Nature">
                    <div style="position:absolute; color:black; background:rgba(255,255,255,0.7); padding:5px; margin-top:-40px;">Click to Visit</div>
                </a>
            </div>
        </div>

        <!-- Window 2 -->
        <div id="win2" class="window" style="top: 150px; left: 150px;">
            <div class="window-header" onmousedown="dragStart(event, 'win2')">
                <span>Web Browser</span>
                <button class="close-btn" onclick="closeWindow('win2')"></button>
            </div>
            <div class="window-content">
                <a href="https://www.wikipedia.org" target="_blank" style="text-decoration: none;">
                    <img src="https://images.unsplash.com/photo-1544197150-b99a580bb7a8?auto=format&fit=crop&w=400&q=80" alt="Server">
                    <div style="position:absolute; color:black; background:rgba(255,255,255,0.7); padding:5px; margin-top:-40px;">Click to Search</div>
                </a>
            </div>
        </div>

        <!-- Window 3 -->
        <div id="win3" class="window" style="top: 200px; left: 200px;">
            <div class="window-header" onmousedown="dragStart(event, 'win3')">
                <span>System Settings</span>
                <button class="close-btn" onclick="closeWindow('win3')"></button>
            </div>
            <div class="window-content">
                <a href="https://github.com" target="_blank" style="text-decoration: none;">
                    <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=400&q=80" alt="Chip">
                    <div style="position:absolute; color:black; background:rgba(255,255,255,0.7); padding:5px; margin-top:-40px;">Click to Update</div>
                </a>
            </div>
        </div>

        <!-- Taskbar -->
        <div id="taskbar">
            <div class="start-btn">Start</div>
            <div class="clock" id="clock">12:00 PM</div>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */

        // 1. Boot Sequence
        window.onload = function() {
            const loadBar = document.getElementById('load-bar');
            const bootScreen = document.getElementById('boot-screen');
            const loginScreen = document.getElementById('login-screen');
            
            // Animate load bar
            setTimeout(() => { loadBar.style.width = '100%'; }, 100);

            // Switch to login screen after 2.5 seconds
            setTimeout(() => {
                bootScreen.style.opacity = '0';
                setTimeout(() => {
                    bootScreen.style.display = 'none';
                    loginScreen.style.display = 'flex';
                    simulateTyping();
                }, 1000);
            }, 2500);
        };

        // 2. Typing Animation
        function simulateTyping() {
            const input = document.getElementById('fake-pass');
            const password = "********";
            let i = 0;
            
            const typeInterval = setInterval(() => {
                if (i < password.length) {
                    input.value += "*";
                    i++;
                } else {
                    clearInterval(typeInterval);
                    // Proceed to desktop after typing finishes
                    setTimeout(loginToDesktop, 800);
                }
            }, 150); // Speed of typing
        }

        function loginToDesktop() {
            const loginScreen = document.getElementById('login-screen');
            const desktop = document.getElementById('desktop');
            
            loginScreen.style.opacity = '0';
            setTimeout(() => {
                loginScreen.style.display = 'none';
                desktop.style.display = 'flex';
                startClock();
            }, 1000);
        }

        // 3. Clock Functionality
        function startClock() {
            const clockEl = document.getElementById('clock');
            setInterval(() => {
                const now = new Date();
                clockEl.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }, 1000);
        }

        // 4. Window Management (Open/Close)
        let zIndexCounter = 10;

        function openWindow(id) {
            const win = document.getElementById(id);
            win.style.display = 'flex';
            bringToFront(win);
        }

        function closeWindow(id) {
            document.getElementById(id).style.display = 'none';
        }

        function bringToFront(element) {
            zIndexCounter++;
            element.style.zIndex = zIndexCounter;
        }

        // 5. Draggable Logic
        let isDragging = false;
        let currentWindow = null;
        let offsetX, offsetY;

        function dragStart(e, id) {
            isDragging = true;
            currentWindow = document.getElementById(id);
            bringToFront(currentWindow);
            
            // Calculate offset relative to the window
            offsetX = e.clientX - currentWindow.getBoundingClientRect().left;
            offsetY = e.clientY - currentWindow.getBoundingClientRect().top;
        }

        document.addEventListener('mousemove', (e) => {
            if (isDragging && currentWindow) {
                e.preventDefault();
                currentWindow.style.left = (e.clientX - offsetX) + 'px';
                currentWindow.style.top = (e.clientY - offsetY) + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            currentWindow = null;
        });

        // Bring window to front on click
        document.querySelectorAll('.window').forEach(win => {
            win.addEventListener('mousedown', () => bringToFront(win));
        });
    </script>
</body>
</html>
